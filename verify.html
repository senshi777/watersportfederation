<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0a1628;--mid:#112240;--gold:#c9a84c;--gold2:#e8c97a;--white:#f8f6f0;--muted:#8899aa}
body{font-family:'Barlow',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;display:flex;flex-direction:column}
nav{background:rgba(10,22,40,.97);border-bottom:1px solid rgba(201,168,76,.2);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center}
.nb{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);text-decoration:none}
.nbk{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-decoration:none}
.nbk:hover{color:var(--gold)}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1rem}
.card{background:var(--mid);border:1px solid rgba(201,168,76,.2);width:100%;max-width:500px;padding:2.5rem}
.card-logo{display:flex;align-items:center;gap:.8rem;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid rgba(201,168,76,.15)}
.logo-circle{width:44px;height:44px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:.9rem;font-weight:700;color:var(--gold);flex-shrink:0}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--white);line-height:1.5}
.logo-text span{display:block;color:var(--gold);font-size:.6rem;letter-spacing:.18em}
h1{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;margin-bottom:.3rem}
h1 strong{font-weight:700;color:var(--gold)}
.sub{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:1.8rem}
.input-row{display:flex;gap:.5rem;margin-bottom:1rem}
.input-row input{flex:1;background:var(--navy);border:1px solid rgba(201,168,76,.25);color:var(--white);padding:.75rem 1rem;font-family:'Barlow',sans-serif;font-size:.9rem;outline:none;transition:border-color .3s}
.input-row input:focus{border-color:var(--gold)}
.btn{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;background:var(--gold);color:var(--navy);border:none;padding:.75rem 1.5rem;cursor:pointer;white-space:nowrap;transition:background .3s}

.btn:disabled{opacity:.5;cursor:not-allowed}
/* Result */
#result{margin-top:1.5rem;display:none}
.result-valid{background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.25);padding:1.5rem}
.result-invalid{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.25);padding:1.5rem}
.result-header{display:flex;align-items:center;gap:.6rem;margin-bottom:1.2rem}
.result-icon{font-size:1.3rem}
.result-title{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase}
.valid-title{color:#4ade80}
.invalid-title{color:#f87171}
.fields{display:flex;flex-direction:column;gap:.6rem}
.field{display:flex;justify-content:space-between;align-items:flex-start;padding:.5rem 0;border-bottom:.5px solid rgba(201,168,76,.1)}
.field:last-child{border-bottom:none}
.field-key{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);flex-shrink:0;margin-right:1rem}
.field-val{font-size:.85rem;color:var(--white);text-align:right}
.field-val.gold{color:var(--gold)}
.field-val.green{color:#4ade80}
.field-val.amber{color:#f59e0b}
.dl-btn{margin-top:1.2rem;width:100%;background:var(--gold);color:var(--navy);font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;border:none;padding:.75rem;cursor:pointer;transition:background .3s}
.dl-btn:hover{background:var(--gold2)}
.dl-btn:disabled{opacity:.5;cursor:not-allowed}
.status-msg{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;letter-spacing:.1em;color:var(--muted);padding:.6rem 0}
footer{text-align:center;padding:1.5rem;font-family:'Barlow Condensed',sans-serif;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(201,168,76,.3)}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nb">WSF · watersportfederation.org</a>
  <a href="index.html" class="nbk">← Back to site</a>
</nav>

<div class="wrap">
  <div class="card">
    <div class="card-logo">
      <div class="logo-circle">WSF</div>
      <div class="logo-text">Water Sport Federation<span>Certificate Verification</span></div>
    </div>

    <h1>Verify <strong>Certificate</strong></h1>
    <div class="sub">Enter certificate ID or scan QR code</div>

    <div class="input-row">
      <input type="text" id="certInput" placeholder="e.g. WSF-2026-555J9YN" autocomplete="off" autocapitalize="characters">
      <button class="btn" onclick="doVerify()">Verify</button>
    </div>

    <div id="statusMsg" class="status-msg"></div>
    <div id="result"></div>
  </div>
</div>

<footer>Water Sport Federation · watersportfederation.org · Swiss NPO</footer>

<script>
var SUPABASE_URL = "https://dxygivvyfwzsrexbtbnc.supabase.co";
var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4eWdpdnZ5Znd6c3JleGJ0Ym5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTA2MjIsImV4cCI6MjA5MTIyNjYyMn0.Ly-k3BUqiJTq-WeZ6m2rL64Ay8jucnzBRjxodm1merQ";

// Hardcoded records (always works, no network needed)
var DB = {
  "WSF-MIT-2026-001": {
    name: "Bilal Jafar",
    type: "Teaching License",
    rank: "Master Instructor Trainer",
    specialty: "Infant Aquatics",
    status: "active",
    issued: "01 January 2026",
    expires: "31 December 2026",
    trainer: "WSF Governing Board"
  }
};

function getDb() {
  try { return window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null; }
  catch(e) { return null; }
}

function showValid(r, id) {
  var result = document.getElementById('result');
  result.innerHTML =
    '<div class="result-valid" id="resultCard">' +
      '<div class="result-header">' +
        '<span class="result-icon" style="color:#4ade80">&#10003;</span>' +
        '<span class="result-title valid-title">Certificate Verified</span>' +
      '</div>' +
      '<div class="fields">' +
        '<div class="field"><span class="field-key">Holder</span><span class="field-val">' + r.name + '</span></div>' +
        '<div class="field"><span class="field-key">Document</span><span class="field-val">' + (r.type||'WSF Certificate') + '</span></div>' +
        '<div class="field"><span class="field-key">Rank / Level</span><span class="field-val">' + r.rank + '</span></div>' +
        '<div class="field"><span class="field-key">Specialty</span><span class="field-val">' + r.specialty + '</span></div>' +
        '<div class="field"><span class="field-key">Status</span><span class="field-val green">Active · Authorized</span></div>' +
        '<div class="field"><span class="field-key">Issued By</span><span class="field-val">' + r.trainer + '</span></div>' +
        '<div class="field"><span class="field-key">Issue Date</span><span class="field-val">' + r.issued + '</span></div>' +
        '<div class="field"><span class="field-key">Expires</span><span class="field-val amber">' + r.expires + '</span></div>' +
        '<div class="field"><span class="field-key">Cert ID</span><span class="field-val gold">' + id + '</span></div>' +
      '</div>' +
      '<button class="dl-btn" id="dlBtn" onclick="dlPDF()">Download PDF</button>' +
    '</div>';
  result.style.display = 'block';
}

function showInvalid() {
  var result = document.getElementById('result');
  result.innerHTML =
    '<div class="result-invalid">' +
      '<div class="result-header">' +
        '<span class="result-icon" style="color:#f87171">&#10005;</span>' +
        '<span class="result-title invalid-title">Not Found</span>' +
      '</div>' +
      '<p style="font-size:.85rem;color:var(--muted);line-height:1.7">No certificate with this ID exists in the WSF database. Please check the ID and try again, or contact WSF directly.</p>' +
    '</div>';
  result.style.display = 'block';
}

async function doVerify() {
  var input = document.getElementById('certInput');
  var id = input.value.trim().toUpperCase();
  var msg = document.getElementById('statusMsg');
  var result = document.getElementById('result');
  if (!id) { input.focus(); return; }
  result.style.display = 'none';
  msg.textContent = 'Checking WSF database...';
  // 1. Check hardcoded
  if (DB[id]) { msg.textContent = ''; showValid(DB[id], id); return; }
  // 2. Check Supabase
  try {
    var db = getDb();
    if (db) {
      var res = await db.from('members').select('*').eq('cert_id', id).single();
      if (res.data && !res.error) {
        var d = res.data;
        msg.textContent = '';
        showValid({
          name: d.name,
          type: d.type === 'license' ? 'Teaching License' : 'Certificate of Attendance',
          rank: d.level || d.specialty || '-',
          specialty: d.level || '-',
          status: d.status,
          issued: d.issued || '-',
          expires: d.expires || '-',
          trainer: d.trainer_name || 'WSF Accredited Trainer'
        }, id);
        return;
      }
    }
  } catch(e) { console.warn('Supabase error:', e.message); }
  msg.textContent = '';
  showInvalid();
}

async function dlPDF() {
  var card = document.getElementById('resultCard');
  if (!card) return;
  var btn = document.getElementById('dlBtn');
  btn.textContent = 'Generating...'; btn.disabled = true;
  try {
    var canvas = await html2canvas(card, {scale:3, backgroundColor:'#0d1a2e', logging:false});
    var img = canvas.toDataURL('image/jpeg', 0.95);
    var pdf = new jspdf.jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
    var pdfW = pdf.internal.pageSize.getWidth();
    var cw = canvas.width/3.7795, ch = canvas.height/3.7795;
    var ratio = Math.min(pdfW/cw, 250/ch);
    pdf.addImage(img, 'JPEG', (pdfW-cw*ratio)/2, 20, cw*ratio, ch*ratio);
    pdf.save('WSF-Verification.pdf');
  } catch(e) { alert('Download failed: ' + e.message); }
  btn.textContent = 'Download PDF'; btn.disabled = false;
}

// Enter key
document.getElementById('certInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doVerify();
});

// Auto-verify from URL params - works from QR code
(function() {
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id') || params.get('verify');
  if (id) {
    document.getElementById('certInput').value = id;
    doVerify();
  }
})();
</script>
</body>
</html>
